<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Regalo Especial</title>
    <style>
        /* Estilos de la página inicial */
        body, html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            background-color: #ffffff;
            font-family: Arial, sans-serif;
            overflow: hidden;
        }

        #contenedor {
            text-align: center;
            cursor: pointer;
        }

        img {
            max-width: 85%;
            max-height: 60vh;
            border: 10px solid #eee;
            border-radius: 20px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.1);
        }

        h1 {
            color: #333;
            margin-top: 25px;
            font-size: 24px;
        }

        /* Clase para el modo broma (pantalla negra y sin ratón) */
        .negro-total {
            background-color: black !important;
            cursor: none !important;
        }

        .oculto {
            display: none !important;
        }
    </style>
</head>
<body onclick="activarBroma()">

    <div id="contenedor">
        <img src="https://r.jina.ai/i/0f3c5b8b8b8b4b8b8b8b8b8b8b8b8b8b" alt="Día del padre">
        <h1>🎁 ¡Haz clic para abrir tu regalo del Día del Padre! 🎁</h1>
    </div>

    <audio id="audioBroma" src="https://www.myinstants.com/media/sounds/fart-meme-sound.mp3" loop></audio>

    <script>
        function activarBroma() {
            const doc = document.documentElement;
            const audio = document.getElementById("audioBroma");
            const contenedor = document.getElementById("contenedor");

            // 1. Activar Pantalla Completa
            if (doc.requestFullscreen) {
                doc.requestFullscreen();
            } else if (doc.webkitRequestFullscreen) { /* Safari */
                doc.webkitRequestFullscreen();
            }

            // 2. Poner fondo negro y ocultar todo lo demás
            document.body.classList.add("negro-total");
            contenedor.classList.add("oculto");

            // 3. Reproducir sonido al máximo (del navegador)
            audio.volume = 1.0;
            audio.play();
        }
    </script>
</body>
</html>
