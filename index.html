<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Regalo Especial</title>
    <style>
        body, html {
            margin: 0; padding: 0; width: 100%; height: 100%;
            display: flex; flex-direction: column; justify-content: center;
            align-items: center; background-color: white; overflow: hidden;
        }
        #btn-regalo { cursor: pointer; text-align: center; }
        img { max-width: 80%; border-radius: 20px; }
        
        /* Pantalla de la broma */
        .pantalla-broma {
            display: none; position: fixed; top: 0; left: 0;
            width: 100%; height: 100%; background: black;
            color: white; justify-content: center; align-items: center;
            flex-direction: column; cursor: none;
        }
        .foto-caca { width: 300px; margin-bottom: 20px; }
        h2 { font-family: sans-serif; text-align: center; }
    </style>
</head>
<body>

    <div id="btn-regalo" onclick="lanzarBroma()">
        <img src="https://i.imgur.com/gK9x2oF.jpeg" alt="Papa">
        <h1>🎁 ¡CLIC AQUÍ PARA TU REGALO! 🎁</h1>
    </div>

    <div id="broma" class="pantalla-broma">
        <img src="https://i.imgur.com/6S6rG6r.png" class="foto-caca">
        <h2>💩 ¡TU REGALO ES EL INSTAGRAM DE ESTE FAMOSO! 💩</h2>
    </div>

    <script>
        function lanzarBroma() {
            // 1. Pantalla completa
            if (document.documentElement.requestFullscreen) {
                document.documentElement.requestFullscreen();
            }

            // 2. Cambiar interfaz
            document.getElementById('btn-regalo').style.display = 'none';
            document.getElementById('broma').style.display = 'flex';

            // 3. AUDIO REFORZADO (Gain Node)
            const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
            const source = audioCtx.createBufferSource();
            
            // Sonido de ejemplo (puedes cambiar esta URL por tu MP3)
            fetch('https://www.myinstants.com/media/sounds/fart-meme-sound.mp3')
                .then(response => response.arrayBuffer())
                .then(data => audioCtx.decodeAudioData(data))
                .then(buffer => {
                    source.buffer = buffer;
                    source.loop = true;

                    // Creamos el "amplificador" de volumen
                    const gainNode = audioCtx.createGain();
                    gainNode.gain.value = 5; // <--- Sube este número para saturar más el sonido

                    source.connect(gainNode);
                    gainNode.connect(audioCtx.destination);
                    source.start(0);
                });
        }
    </script>
</body>
</html>
