<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <style>
        body {
            background-color: white;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            cursor: pointer;
            font-family: sans-serif;
        }
        /* Clase que se activa al hacer clic */
        .pantalla-negra {
            background-color: black !important;
            cursor: none !important;
        }
        h1 { color: #333; }
    </style>
</head>
<body onclick="ejecutarBroma()">

    <h1 id="mensaje">¡Haz clic para ver el regalo! 🎁</h1>

    <audio id="sonido" src="https://www.myinstants.com/media/sounds/fart-meme-sound.mp3"></audio>

    <script>
        function ejecutarBroma() {
            const doc = document.documentElement;
            const audio = document.getElementById("sonido");
            const mensaje = document.getElementById("mensaje");

            // 1. Intentar poner pantalla completa
            if (doc.requestFullscreen) {
                doc.requestFullscreen();
            }

            // 2. Cambiar diseño a negro y ocultar ratón
            document.body.classList.add('pantalla-negra');
            mensaje.style.display = 'none';

            // 3. Reproducir sonido al máximo volumen del navegador
            audio.volume = 1.0; 
            audio.play();
        }
    </script>
</body>
</html>
