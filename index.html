<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BallMaster Ultra Store 2026</title>
    <style>
        :root {
            --primary: #0f172a;
            --accent: #3b82f6;
            --offer: #ef4444;
            --bg: #f8fafc;
            --card-bg: #ffffff;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Segoe UI', system-ui, sans-serif; }
        body { background-color: var(--bg); color: #1e293b; }

        /* --- NAVEGACIÓN --- */
        nav {
            background: var(--primary);
            color: white;
            padding: 1rem 5%;
            display: flex;
            justify-content: space-between;
            align-items: center;
            position: sticky;
            top: 0; z-index: 1000;
        }
        .logo { font-size: 1.5rem; font-weight: bold; cursor: pointer; }
        .logo span { color: var(--accent); }
        .nav-menu button {
            background: none; border: none; color: white;
            margin-left: 15px; cursor: pointer; font-size: 1rem;
            transition: 0.3s;
        }
        .nav-menu button:hover { color: var(--accent); }

        /* --- FILTROS --- */
        .filter-bar {
            background: white;
            padding: 20px 5%;
            display: flex;
            flex-wrap: wrap;
            gap: 20px;
            align-items: center;
            border-bottom: 1px solid #e2e8f0;
        }
        .filter-group { display: flex; flex-direction: column; gap: 5px; }
        select, input { padding: 8px; border: 1px solid #cbd5e1; border-radius: 5px; }

        /* --- CONTENIDO --- */
        .container { max-width: 1200px; margin: 30px auto; padding: 0 20px; }
        
        .products-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(250px, 1fr));
            gap: 25px;
        }

        .card {
            background: var(--card-bg);
            border-radius: 12px;
            padding: 20px;
            box-shadow: 0 4px 6px -1px rgba(0,0,0,0.1);
            transition: 0.3s;
            position: relative;
            display: flex; flex-direction: column;
        }
        .card:hover { transform: translateY(-5px); }
        
        .card-img { font-size: 4rem; text-align: center; margin-bottom: 15px; }
        .tag-offer {
            position: absolute; top: 10px; right: 10px;
            background: var(--offer); color: white;
            padding: 4px 10px; border-radius: 5px; font-size: 0.75rem; font-weight: bold;
        }
        .card h3 { font-size: 1.1rem; margin-bottom: 10px; }
        .category-label { font-size: 0.7rem; text-transform: uppercase; color: #64748b; margin-bottom: 5px; }
        
        .price-box { margin-top: auto; padding-top: 15px; display: flex; align-items: baseline; gap: 10px; }
        .current-price { font-size: 1.4rem; font-weight: bold; color: var(--primary); }
        .old-price { text-decoration: line-through; color: #94a3b8; font-size: 0.9rem; }

        /* --- SECCIÓN SEGURIDAD --- */
        .verification-panel {
            background: #f1f5f9; border: 2px solid #cbd5e1;
            padding: 30px; border-radius: 15px; margin-top: 50px; text-align: center;
        }
        .status-ok { color: #10b981; font-weight: bold; }

        /* --- BOTÓN PULSE AQUÍ --- */
        .btn-problem {
            background: var(--offer); color: white; border: none;
            padding: 15px 30px; border-radius: 8px; font-weight: bold;
            cursor: pointer; animation: pulse 2s infinite; margin-top: 20px;
        }
        @keyframes pulse {
            0% { box-shadow: 0 0 0 0 rgba(239, 68, 68, 0.7); }
            70% { box-shadow: 0 0 0 15px rgba(239, 68, 68, 0); }
            100% { box-shadow: 0 0 0 0 rgba(239, 68, 68, 0); }
        }
    </style>
</head>
<body>

<nav>
    <div class="logo" onclick="renderProducts('all')">BALL<span>MASTER</span></div>
    <div class="nav-menu">
        <button onclick="renderProducts('all')">Catálogo Completo</button>
        <button onclick="filterOffers()">Solo Ofertas 🔥</button>
        <button onclick="renderProducts('tennis')">Tennis</button>
        <button onclick="renderProducts('basket')">Basket</button>
        <button onclick="renderProducts('futbol')">Fútbol</button>
    </div>
</nav>

<div class="filter-bar">
    <div class="filter-group">
        <label>Precio Mínimo (€):</label>
        <input type="number" id="minPrice" value="0" oninput="applyFilters()">
    </div>
    <div class="filter-group">
        <label>Precio Máximo (€):</label>
        <input type="number" id="maxPrice" value="100" oninput="applyFilters()">
    </div>
    <div class="filter-group">
        <label>Ordenar por:</label>
        <select id="sortOrder" onchange="applyFilters()">
            <option value="asc">Precio: Menor a Mayor</option>
            <option value="desc">Precio: Mayor a Menor</option>
        </select>
    </div>
</div>

<div class="container">
    <div id="productContainer" class="products-grid">
        </div>

    <div class="verification-panel">
        <h3>🛡️ Business Verification & App Security</h3>
        <p>Estado del Servidor: <span class="status-ok">OPERATIVO Y VERIFICADO</span></p>
        <p><small>Certificado KYB: #2026-X99-PRO. Esta aplicación utiliza cifrado de nivel bancario.</small></p>
        <button class="btn-problem" onclick="alert('Iniciando diagnóstico de seguridad...')">PROBLEMA? PULSE AQUÍ</button>
    </div>
</div>

<script>
    // BASE DE DATOS DE PRODUCTOS
    const products = [
        { id: 1, name: "Pelota Tenis Wilson Pro", cat: "tennis", price: 12.50, oldPrice: 15, offer: true, icon: "🎾" },
        { id: 2, name: "Balón Spalding NBA", cat: "basket", price: 45.00, oldPrice: null, offer: false, icon: "🏀" },
        { id: 3, name: "Pelota Fútbol Champions", cat: "futbol", price: 29.99, oldPrice: 60, offer: true, icon: "⚽" },
        { id: 4, name: "Pack Tenis Entrenamiento", cat: "tennis", price: 8.00, oldPrice: null, offer: false, icon: "🎾" },
        { id: 5, name: "Basket Street Black", cat: "basket", price: 19.95, oldPrice: 35, offer: true, icon: "🏀" },
        { id: 6, name: "Balón Sala Elite", cat: "futbol", price: 24.50, oldPrice: null, offer: false, icon: "⚽" },
        { id: 7, name: "Pelota Tenis Gold Edition", cat: "tennis", price: 32.00, oldPrice: 40, offer: true, icon: "🎾" },
        { id: 8, name: "Pelota Basket Infantil", cat: "basket", price: 15.00, oldPrice: null, offer: false, icon: "🏀" }
    ];

    let currentCategory = 'all';
    let onlyOffers = false;

    function renderProducts(category) {
        currentCategory = category;
        onlyOffers = false;
        applyFilters();
    }

    function filterOffers() {
        onlyOffers = true;
        applyFilters();
    }

    function applyFilters() {
        const min = parseFloat(document.getElementById('minPrice').value) || 0;
        const max = parseFloat(document.getElementById('maxPrice').value) || 999;
        const sort = document.getElementById('sortOrder').value;

        // 1. Filtrar por categoría y ofertas
        let filtered = products.filter(p => {
            const matchCat = (currentCategory === 'all' || p.cat === currentCategory);
            const matchOffer = onlyOffers ? p.offer : true;
            const matchPrice = p.price >= min && p.price <= max;
            return matchCat && matchOffer && matchPrice;
        });

        // 2. Ordenar
        filtered.sort((a, b) => {
            return sort === 'asc' ? a.price - b.price : b.price - a.price;
        });

        // 3. Dibujar en pantalla
        const container = document.getElementById('productContainer');
        container.innerHTML = '';

        if(filtered.length === 0) {
            container.innerHTML = "<p>No hay productos que coincidan con los filtros.</p>";
            return;
        }

        filtered.forEach(p => {
            container.innerHTML += `
                <div class="card">
                    ${p.offer ? '<span class="tag-offer">OFERTA</span>' : ''}
                    <div class="category-label">${p.cat}</div>
                    <div class="card-img">${p.icon}</div>
                    <h3>${p.name}</h3>
                    <div class="price-box">
                        <span class="current-price">${p.price.toFixed(2)}€</span>
                        ${p.oldPrice ? `<span class="old-price">${p.oldPrice}€</span>` : ''}
                    </div>
                </div>
            `;
        });
    }

    // Carga inicial
    renderProducts('all');
</script>

</body>
</html>
